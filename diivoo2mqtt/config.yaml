name: "Diivoo2MQTT"
version: "0.1.58.2"
slug: "diivoo2mqtt"
description: "A Home Assistant add-on for running DIIVOO water timers locally over MQTT "
url: "https://github.com/Technerd-SG/hassio-diivoo2mqtt"
init: false
startup: application
boot: auto

hassio_api: true
hassio_role: default

arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

ingress: true
ingress_port: 8099
panel_icon: mdi:water-pump
panel_title: Diivoo2MQTT

ports:
  8099/tcp: 8099

ports_description:
  8099/tcp: OTA firmware update server (used by ESP32 gateways)

options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  language: "en"

schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password?
  language: "list(en|de|nl|fr|es|it|pl|pt|sv|nb|da|fi|cs|sk|hu|ro|hr|sl|bg|lt|lv|et|el|tr|ru|uk|zh-Hans|zh-Hant|ja|ko|ar|he|vi|id|ms|th)"